openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: StreetBite API - Street Vendor Order Management System
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: vendors
    description: Vendor operations
  - name: menu
    description: Menu item operations
  - name: orders
    description: Order operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  
  # Authentication
  /auth/send-otp:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to phone number
      description: Sends a 6-digit OTP to the vendor's phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpRequest"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOtpResponse"
        "400":
          description: Invalid phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and login
      description: Verifies the OTP and returns authentication token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: OTP verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyOtpResponse"
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
  # Vendors
  /vendors/{vendorId}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get vendor details
      description: Returns vendor information by ID
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "404":
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    
    put:
      operationId: updateVendor
      tags: [vendors]
      summary: Update vendor details
      description: Updates vendor information (requires authentication)
      security:
        - bearerAuth: []
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorRequest"
      responses:
        "200":
          description: Vendor updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
  /vendors/me:
    get:
      operationId: getMyVendorProfile
      tags: [vendors]
      summary: Get authenticated vendor profile
      description: Returns the authenticated vendor's profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Vendor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
  # Menu Items
  /vendors/{vendorId}/menu:
    get:
      operationId: getVendorMenu
      tags: [menu]
      summary: Get vendor menu
      description: Returns all menu items for a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [main, side, drink, dessert]
        - name: available
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Menu items retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    
    post:
      operationId: createMenuItem
      tags: [menu]
      summary: Create menu item
      description: Creates a new menu item (requires authentication)
      security:
        - bearerAuth: []
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemRequest"
      responses:
        "201":
          description: Menu item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
  /menu/{menuItemId}:
    put:
      operationId: updateMenuItem
      tags: [menu]
      summary: Update menu item
      description: Updates a menu item (requires authentication)
      security:
        - bearerAuth: []
      parameters:
        - name: menuItemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMenuItemRequest"
      responses:
        "200":
          description: Menu item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Menu item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    
    delete:
      operationId: deleteMenuItem
      tags: [menu]
      summary: Delete menu item
      description: Deletes a menu item (requires authentication)
      security:
        - bearerAuth: []
      parameters:
        - name: menuItemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Menu item deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Menu item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
  # Orders
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create new order
      description: Creates a new order from customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid order data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order details
      description: Returns order information by ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
  /orders/{orderId}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      description: Updates order status (requires vendor authentication)
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
  /vendors/{vendorId}/orders:
    get:
      operationId: getVendorOrders
      tags: [orders]
      summary: Get vendor orders
      description: Returns all orders for a vendor (requires authentication)
      security:
        - bearerAuth: []
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, preparing, ready, delivered]
      responses:
        "200":
          description: Orders retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
  /vendors/{vendorId}/token-counter:
    get:
      operationId: getTokenCounter
      tags: [orders]
      summary: Get current token counter
      description: Returns the next token number for the vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Token counter retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenCounterResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
    
    # Auth Schemas
    SendOtpRequest:
      type: object
      properties:
        phoneNumber:
          type: string
          pattern: '^\d{10}$'
          example: "9876543210"
      required:
        - phoneNumber
    
    SendOtpResponse:
      type: object
      properties:
        message:
          type: string
        expiresIn:
          type: integer
          description: OTP expiry time in seconds
      required:
        - message
        - expiresIn
    
    VerifyOtpRequest:
      type: object
      properties:
        phoneNumber:
          type: string
          pattern: '^\d{10}$'
        otp:
          type: string
          pattern: '^\d{6}$'
      required:
        - phoneNumber
        - otp
    
    VerifyOtpResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT authentication token
        vendor:
          $ref: "#/components/schemas/Vendor"
      required:
        - token
        - vendor
    
    # Vendor Schemas
    Vendor:
      type: object
      properties:
        id:
          type: integer
        phoneNumber:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        rating:
          type: number
          format: float
        isOpen:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - phoneNumber
        - name
        - description
        - category
        - rating
        - isOpen
    
    UpdateVendorRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        isOpen:
          type: boolean
    
    # Menu Item Schemas
    MenuItem:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: integer
          description: Price in cents/paise
        category:
          type: string
          enum: [main, side, drink, dessert]
        emoji:
          type: string
        available:
          type: boolean
        rating:
          type: number
          format: float
        prepTime:
          type: integer
          description: Preparation time in minutes
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - vendorId
        - name
        - description
        - price
        - category
        - emoji
        - available
        - rating
        - prepTime
    
    CreateMenuItemRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: integer
        category:
          type: string
          enum: [main, side, drink, dessert]
        emoji:
          type: string
        available:
          type: boolean
        rating:
          type: number
          format: float
        prepTime:
          type: integer
      required:
        - name
        - description
        - price
        - category
        - emoji
        - prepTime
    
    UpdateMenuItemRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: integer
        category:
          type: string
          enum: [main, side, drink, dessert]
        emoji:
          type: string
        available:
          type: boolean
        rating:
          type: number
          format: float
        prepTime:
          type: integer
    
    # Order Schemas
    OrderItem:
      type: object
      properties:
        menuItemId:
          type: integer
        name:
          type: string
        price:
          type: integer
        quantity:
          type: integer
      required:
        - menuItemId
        - name
        - price
        - quantity
    
    Order:
      type: object
      properties:
        id:
          type: integer
        tokenNumber:
          type: integer
        vendorId:
          type: integer
        customerId:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        status:
          type: string
          enum: [pending, preparing, ready, delivered]
        total:
          type: integer
          description: Total price in cents/paise
        estimatedTime:
          type: integer
          description: Estimated preparation time in minutes
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - tokenNumber
        - vendorId
        - items
        - status
        - total
        - estimatedTime
    
    CreateOrderRequest:
      type: object
      properties:
        vendorId:
          type: integer
        customerId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
          minItems: 1
        total:
          type: integer
        estimatedTime:
          type: integer
      required:
        - vendorId
        - items
        - total
        - estimatedTime
    
    UpdateOrderStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, preparing, ready, delivered]
      required:
        - status
    
    TokenCounterResponse:
      type: object
      properties:
        nextToken:
          type: integer
      required:
        - nextToken

