kind = "mobile"
previewPath = "/"
title = "Street Vendor Order App"
version = "1.0.0"
id = "artifacts/street-vendor-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20450

[services.development]
run = "pnpm --filter @workspace/street-vendor-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/street-vendor-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/street-vendor-app", "run", "serve" ]

[services.env]
PORT = "20450"
BASE_PATH = "/"
